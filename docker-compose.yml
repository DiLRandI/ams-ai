services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ams
      POSTGRES_USER: ams
      POSTGRES_PASSWORD: ams
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ams -d ams"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: deploy/backend.Dockerfile
    environment:
      PORT: 8080
      DATABASE_URL: postgres://ams:ams@postgres:5432/ams?sslmode=disable
      AUTH_SECRET: local-dev-secret-change-me-32chars
      TOKEN_TTL_MINUTES: 1440
      REMINDER_WINDOW_DAYS: 30
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: ams-documents
      MINIO_USE_SSL: "false"
      MAX_UPLOAD_BYTES: 20971520
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ""
      VITE_DEV_PROXY_TARGET: http://backend:8080
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres-data:
    name: ams-ai_postgres18-data
  minio-data:
